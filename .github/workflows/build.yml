name: Build APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y zip unzip git libltdl-dev

      - name: Install buildozer
        run: pip install buildozer cython==0.29.33

      - name: Build APK
        run: buildozer android debug

      - name: Rename APK (去掉debug标记)
        run: |
          cd bin
          APK=$(ls *.apk | head -1)
          NEW_NAME=$(echo "$APK" | sed 's/-debug/-release/')
          mv "$APK" "$NEW_NAME"
          echo "Renamed: $APK -> $NEW_NAME"

      - name: Upload APK (artifact, 仅手动触发时)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: qixincha-apk
          path: bin/*.apk

      - name: 提取更新日志
        if: startsWith(github.ref, 'refs/tags/')
        id: changelog
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          # 从 CHANGELOG.md 提取对应版本的描述
          # 格式：## vX.Y.Z 后面的内容，直到下一个 ## 或文件结尾
          SECTION=$(awk "/^## ${TAG_NAME}/{found=1; next} /^## /{if(found) exit} {if(found) print}" CHANGELOG.md)
          if [ -z "$SECTION" ]; then
            SECTION="暂无更新描述，请查看 CHANGELOG.md"
          fi
          # 写入 GITHUB_ENV 供后续步骤使用
          echo "RELEASE_BODY<<EOFMARKER" >> $GITHUB_ENV
          echo "企信查 APK（Android 12–16）" >> $GITHUB_ENV
          echo "包名：com.qxx.johnny" >> $GITHUB_ENV
          echo "架构：arm64-v8a / armeabi-v7a" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "$SECTION" >> $GITHUB_ENV
          echo "EOFMARKER" >> $GITHUB_ENV

      - name: Release APK (永久直链，仅在打 tag 时)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: bin/*.apk
          name: 企信查 ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body: ${{ env.RELEASE_BODY }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
